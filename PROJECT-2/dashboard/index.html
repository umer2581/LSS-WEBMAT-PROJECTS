<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="../dashboard/css/style.css">
    <title>Mbus courier india pvt.ltd.</title>
    <script>
        // Function to handle submenu display
        function toggleSubMenu(event) {
            var submenu = this.querySelector('.submenu');
            if (submenu) {
                submenu.style.display = submenu.style.display === "none" ? "block" : "none";
                event.stopPropagation();
            }
        }

        // Add event listeners to menu items with submenu
        var menuItems = document.querySelectorAll('.menu-bar li');
        for (var i = 0; i < menuItems.length; i++) {
            var menuItem = menuItems[i];
            menuItem.addEventListener('click', toggleSubMenu);
        }
    </script>
</head>
<body>
    <div class="header">
        <a href="#" class="track-shipment">Track Shipment</a>
    </div>
    <div class="menu-bar">
        <div class="logo">
            <img src="images/mbus courier.gif" alt="Logo">
        </div>
        <hr>
        <div class="menu-list">
            <ul>
                <li class="active"><i class="fas fa-qrcode"></i> Inscan Entry<i class="fas fa-caret-right dropdown-icon"></i>
                    <ul class="submenu">
                        <li>Booking</li>
                        <li>Hubscan</li>
                    </ul>
                </li>
                <li><i class="fas fa-sign-out-alt"></i> Outscan Entry<i class="fas fa-caret-right dropdown-icon"></i>
                    <ul class="submenu">
                        <li>Manifest Entry</li>
                        <li>Out for Delivery</li>
                    </ul>
                </li>
                <li><i class="fas fa-info-circle"></i> Status Entry<i class="fas fa-caret-right dropdown-icon"></i>
                    <ul class="submenu">
                        <li>POD Entry</li>
                    </ul>
                </li>
                <li><i class="fas fa-exchange-alt"></i> Transactions</li>
                <li><i class="fas fa-print"></i> Print Document</li>
                <li><i class="fas fa-truck"></i> Digital Delivery</li>
                <li><i class="fas fa-sign-out-alt"></i> Logout</li>
            </ul>
        </div>
    </div>

   
</body>
</html>
