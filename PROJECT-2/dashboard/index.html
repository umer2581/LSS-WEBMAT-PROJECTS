<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="../dashboard/css/style.css">
    <title>Mbus courier india pvt.ltd.</title>
</head>

<body>
    <div class="outer">
        <div class="header">
            <div class="track-btn">
                <div class="track-shipment">TRACK YOUR SHIPMENT</div>
            </div>
        </div> <!-- Top Header end-->

        <div class="main">
            <div class="mleft">
                <div class="menu-bar">

                    <div class="logo">
                        <img src="images/mbus courier.gif" alt="Logo">
                    </div>
                    <hr>
                    <div class="menu-list">
                        <ul>
                            <li class="active"><i class="fas fa-qrcode"></i> Inscan Entry<i
                                    class="fas fa-caret-right dropdown-icon"></i>
                                <ul class="submenu">
                                    <li>Booking</li>
                                    <li>Hubscan</li>
                                </ul>
                            </li>
                            <li><i class="fas fa-sign-out-alt"></i> Outscan Entry<i
                                    class="fas fa-caret-right dropdown-icon"></i>
                                <ul class="submenu">
                                    <li>Manifest Entry</li>
                                    <li>Out for Delivery</li>
                                </ul>
                            </li>
                            <li><i class="fas fa-info-circle"></i> Status Entry<i
                                    class="fas fa-caret-right dropdown-icon"></i>
                                <ul class="submenu">
                                    <li>POD Entry</li>
                                </ul>
                            </li>
                            <li><i class="fas fa-exchange-alt"></i> Transactions</li>
                            <li><i class="fas fa-print"></i> Print Document</li>
                            <li><i class="fas fa-truck"></i> Digital Delivery</li>
                            <li><i class="fas fa-sign-out-alt"></i> Logout</li>
                        </ul>
                    </div>
                </div>
            </div> <!--mleft end-->
            <div class="mright">
                <div class="dbname">


                    <div class="dname">

                        <i class="fas fa-info-circle" style="font-size: 24px; color: red;"></i> Dashboard
                    </div>
                </div>
                <div class="main-boxes">
                    <div class="boxes"></div>
                    <div class="boxes"></div>
                    <div class="boxes"></div>
                    <div class="boxes"></div>
                    
                </div>
            </div>
           
        </div>
    </div>
    <!--Outer end-->
</body>

</html>
